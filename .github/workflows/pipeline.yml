name: Notes App Pipeline

# Run this pipeline when you push code to main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── JOB 1: TEST ──────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest  # GitHub gives us a free Linux machine

    steps:
      # Step 1: Download your code onto the machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Step 3: Install backend packages
      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      # Step 4: Run the tests
      - name: Run backend tests
        run: |
          cd backend
          npm test

  # ── JOB 2: BUILD ─────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test  # Only runs if tests passed ✅

    steps:
      # Step 1: Download your code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Build all Docker images using compose
      - name: Build Docker images
        run: docker compose build

      # Step 3: Start containers and check they run
      - name: Start containers
        run: docker compose up -d

      # Step 4: Wait a few seconds for everything to start
      - name: Wait for containers
        run: sleep 10

      # Step 5: Check all containers are running
      - name: Check containers are healthy
        run: docker compose ps

      # Step 6: Stop everything
      - name: Stop containers
        run: docker compose down